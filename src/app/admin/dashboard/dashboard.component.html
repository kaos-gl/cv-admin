<div class="dashboard">
  <div class="dashboard__header">
    <div>
      <h1>CV Admin Panel</h1>
      <p class="dashboard__subtitle">Manage your CV content in real time</p>
    </div>
  </div>

  @if (loading) {
    <div class="stats-grid">
      <div class="skeleton skeleton--card" *ngFor="let i of [1,2,3,4,5,6]"></div>
    </div>
  } @else {
    <div class="stats-grid">
      @for (stat of stats; track stat.path) {
        <a [routerLink]="['/admin/section', stat.path]" class="stat-card">
          <div class="stat-card__icon">{{ stat.icon }}</div>
          <div class="stat-card__body">
            <span class="stat-card__label">{{ stat.label }}</span>
            <span class="stat-card__count">{{ stat.count }}</span>
          </div>
          <div class="stat-card__arrow">→</div>
        </a>
      }
    </div>
  }

  <div class="quick-links">
    <h2>Quick Actions</h2>
    <div class="quick-links__grid">
      @for (stat of stats; track stat.path) {
        <a [routerLink]="['/admin/section', stat.path]" class="quick-link">
          {{ stat.icon }} {{ stat.label }}
        </a>
      }
    </div>
  </div>
</div>
